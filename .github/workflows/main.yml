# Workflow that builds Quassel on various Linux distros, and creates packages for both Windows and macOS.
# For tagged pushes, a draft release is automatically created, using the tag message as release description
# and attaching Windows and macOS builds, as well as the source archive.
name: Quassel CI

on:
  push:
  pull_request:
  schedule:
    # * is a special character in YAML so you have to quote this string
    # Run at 13:37 on the 14th of every month (odd time to reduce load)
    - cron: '37 13 14 * *'

# Can't use simpler definition of [ push, pull_request, schedule ]
# See https://www.jeffgeerling.com/blog/2020/running-github-actions-workflow-on-schedule-and-other-events

defaults:
  run:
    shell: bash

jobs:

# ------------------------------------------------------------------------------------------------------------------------------------------
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    container: quassel/quassel-build-env:${{ matrix.dist }}
    strategy:
      fail-fast: false
      matrix:
        dist: [ debian-stable, debian-testing, ubuntu-plucky ]
        cxx: [ 'g++', 'clang++' ]
        with-kde: [ -DWITH_KDE=ON ]
        extra-options: [ -DWITH_WEBENGINE=ON ]
    env:
        CXX: ${{ matrix.cxx }}

    steps:
    - name: Check out source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ github.job }}-${{ matrix.dist }}-${{ matrix.cxx }}

    - name: Prepare container environment
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        apt-get update
        apt-get install -y --no-install-recommends qt6-5compat-dev

    - name: Configure
      run: |
        mkdir build
        cd build && cmake $GITHUB_WORKSPACE \
                          -GNinja \
                          -DCMAKE_BUILD_TYPE=Release \
                          -DBUILD_TESTING=ON \
                          -DFATAL_WARNINGS=ON \
                          ${{ matrix.with-kde }} \
                          ${{ matrix.extra-options }}

    - name: Build
      run: cd build && ninja

    - name: Run tests
      run: cd build && ctest --output-on-failure

    - name: Install
      run: cd build && DESTDIR=$GITHUB_WORKSPACE/image ninja install

  build-linux-noble:
    name: Linux (ubuntu-noble, -DWITH_KDE=OFF, -DWITH_WEBENGINE=OFF)
    runs-on: ubuntu-24.04

    steps:
    - name: Check out source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ github.job }}

    - name: Prepare runner environment
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          ccache \
          cmake \
          gettext \
          git \
          libboost-dev \
          libgtest-dev \
          libssl-dev \
          libqt6sql6-sqlite \
          ninja-build \
          pkg-config \
          qt6-5compat-dev \
          qt6-base-dev \
          qt6-base-dev-tools \
          qt6-tools-dev-tools \
          zlib1g-dev

    - name: Configure
      run: |
        mkdir build
        cd build && cmake $GITHUB_WORKSPACE \
                          -GNinja \
                          -DCMAKE_BUILD_TYPE=Release \
                          -DBUILD_TESTING=ON \
                          -DFATAL_WARNINGS=ON \
                          -DWITH_KDE=OFF \
                          -DWITH_WEBENGINE=OFF

    - name: Build
      run: cd build && ninja

    - name: Run tests
      run: cd build && ctest --output-on-failure

    - name: Install
      run: cd build && DESTDIR=$GITHUB_WORKSPACE/image ninja install

  build-linux-postgres:
    name: Linux (ubuntu-24.04, PostgreSQL integration)
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Check out source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ github.job }}

    - name: Prepare runner environment
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          ccache \
          cmake \
          gettext \
          git \
          libboost-dev \
          libgtest-dev \
          libqt6sql6-psql \
          libqt6sql6-sqlite \
          libssl-dev \
          ninja-build \
          pkg-config \
          qt6-5compat-dev \
          qt6-base-dev \
          qt6-base-dev-tools \
          qt6-tools-dev-tools \
          zlib1g-dev

    - name: Configure
      run: |
        mkdir build
        cd build && cmake $GITHUB_WORKSPACE \
                          -GNinja \
                          -DCMAKE_BUILD_TYPE=Release \
                          -DBUILD_TESTING=ON \
                          -DFATAL_WARNINGS=ON \
                          -DWITH_KDE=OFF \
                          -DWITH_WEBENGINE=OFF

    - name: Build
      run: cd build && ninja

    - name: Run tests
      env:
        QUASSEL_TEST_PGSQL_USERNAME: postgres
        QUASSEL_TEST_PGSQL_PASSWORD: postgres
        QUASSEL_TEST_PGSQL_HOSTNAME: 127.0.0.1
        QUASSEL_TEST_PGSQL_PORT: ${{ job.services.postgres.ports[5432] }}
        QUASSEL_TEST_PGSQL_MAINTENANCE_DATABASE: postgres
        QUASSEL_TEST_PGSQL_DATABASE_PREFIX: quassel_ci_
      run: cd build && ctest --output-on-failure

    - name: Install
      run: cd build && DESTDIR=$GITHUB_WORKSPACE/image ninja install

  build-linux-arch:
    name: Arch Linux
    runs-on: ubuntu-latest
    container: archlinux:base-devel

    steps:
    - name: Check out source code
      uses: actions/checkout@v4
      # The stock Arch container doesn't ship git, so checkout falls back to the
      # archive download path. That's fine here because the only submodule is
      # optional for CI and the build no longer requires it.

    - name: Prepare container environment
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm --needed \
          boost \
          ccache \
          cmake \
          git \
          gtest \
          ninja \
          qca-qt6 \
          qt6-5compat \
          qt6-base \
          qt6-multimedia \
          qt6-tools \
          zlib

    - name: Configure
      run: |
        mkdir build
        cd build && cmake $GITHUB_WORKSPACE \
                          -GNinja \
                          -DCMAKE_BUILD_TYPE=Release \
                          -DBUILD_TESTING=ON \
                          -DFATAL_WARNINGS=ON \
                          -DWITH_KDE=OFF \
                          -DWITH_WEBENGINE=OFF

    - name: Build
      run: cd build && ninja

    - name: Run tests
      run: cd build && ctest --output-on-failure

    - name: Install
      run: cd build && DESTDIR=$GITHUB_WORKSPACE/image ninja install

 # ------------------------------------------------------------------------------------------------------------------------------------------
  build-macos:
    name: macOS
    runs-on: macos-${{ matrix.osversion }}
    strategy:
      fail-fast: false
      matrix:
        # Keep macOS CI pinned to the currently validated runner image instead of
        # following `latest`, which can change the Xcode/SDK combination underneath us.
        osversion: [14]

    steps:
    - name: Select Xcode version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        # Newer Xcode versions may not officially be supported by Qt
        # Check https://doc.qt.io/qt-6/macos.html
        xcode-version: '15.x'

    - name: Check out source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # so git-describe works
        submodules: recursive

    - name: Fetch tag information
      if: startsWith(github.ref, 'refs/tags/')
      run: git fetch -f origin $GITHUB_REF:$GITHUB_REF

    - name: Install dependencies
      # Skip "brew update" as it can trigger 50+ minutes of updating.
      # GitHub Actions intentionally disables the default auto-update on their
      # macOS CI images (and macOS CI images usually update once a week).
      #
      # See https://github.com/actions/virtual-environments/issues/2173
      # > We've set no auto-update intentionally here [...]
      # And https://github.com/microsoft/appcenter/issues/293
      #
      # If Homebrew begins failing in the future due to out-of-date versions,
      # it can be re-enabled here as follows...
      # run: brew update && [below command]
      run: brew install boost ccache qt

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ github.job }}-${{ matrix.osversion }}

    - name: Configure
      run: |
        mkdir build
        cd build && cmake $GITHUB_WORKSPACE \
                          -GNinja \
                          -DWANT_CORE=ON \
                          -DWANT_QTCLIENT=ON \
                          -DWANT_MONO=ON \
                          -DCMAKE_PREFIX_PATH=$(brew --prefix qt) \
                          -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/bundles \
                          -DCMAKE_BUILD_TYPE=Release \
                          -DBUILD_TESTING=ON \
                          -DFATAL_WARNINGS=OFF \
                          -DENABLE_SHARED=OFF \
                          -DBUNDLE=ON \


    - name: Build
      run: cd build && ninja

    - name: Run tests
      run: cd build && ctest --output-on-failure

    - name: Install
      run: cd build && ninja install

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macOS-${{ matrix.osversion }}
        path: ${{ github.workspace }}/bundles/*.dmg

# ------------------------------------------------------------------------------------------------------------------------------------------
  build-windows:
    name: Windows
    runs-on: windows-latest
    continue-on-error: true
    if: false # Disabled pending Qt6 Craft validation
    env:
      WORKSPACE: ${{ github.workspace }}
      CRAFT: /C/CraftMaster/windows-msvc2019_64-cl/craft/bin/craft.py

    steps:
    - name: Check out source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # so git-describe works
        submodules: recursive

    - name: Fetch tag information
      if: startsWith(github.ref, 'refs/tags/')
      run: git fetch -f origin $GITHUB_REF:$GITHUB_REF

    - name: Clone CraftMaster
      run: git clone --depth=1 https://invent.kde.org/packaging/craftmaster.git /C/CraftMaster/CraftMaster

    - name: Configure CraftMaster
      run: python /C/CraftMaster/CraftMaster/CraftMaster.py --config $WORKSPACE/.craftsettings.ini --variables "WORKSPACE=$WORKSPACE"

    - name: Add Quassel blueprint
      run: python $CRAFT --add-blueprint-repository https://github.com/quassel/craft-blueprints-quassel.git

    - name: Install NSIS
      run: python $CRAFT dev-utils/nsis

    - name: Install dependencies
      run: python $CRAFT --install-deps quassel/quassel

    - name: Build
      run: python $CRAFT --no-cache --src-dir $WORKSPACE quassel/quassel

    - name: Run tests
      run: python $CRAFT --no-cache --src-dir $WORKSPACE --test quassel/quassel

    - name: Package
      run: python $CRAFT --no-cache --src-dir $WORKSPACE --package quassel/quassel

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Windows
        path: ${{ github.workspace }}/packages/*

# ------------------------------------------------------------------------------------------------------------------------------------------
  post-build:
    name: Post-Build
    runs-on: ubuntu-latest
    needs: [ build-linux, build-macos ] # Windows artifacts are optional while the Craft path stays disabled
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Check out source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Fetch tag information
      if: startsWith(github.ref, 'refs/tags/')
      run: git fetch -f origin $GITHUB_REF:$GITHUB_REF

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List artifacts
      run: ls -lhR artifacts

    - name: Check artifacts
      run: |
        mac_count=$(find artifacts/ -type f -name 'Quassel*.dmg' -printf '.' | wc -c)
        windows_count=$(find artifacts/ \( -type f -name 'quassel*.exe' -o -type f -name 'quassel*.7z' \) -printf '.' | wc -c)
        [[ "$mac_count" -eq 3 ]]
        [[ "$windows_count" -eq 0 || "$windows_count" -eq 2 ]]

    - name: Create release notes
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        # Use the tag's annotation as release notes
        TAGNAME=$(git rev-parse --abbrev-ref $GITHUB_REF)
        MESSAGE=$(git tag -l --format='%(contents)' $TAGNAME | perl -ne 'print if not /-----BEGIN PGP SIGNATURE-----/../-----END PGP SIGNATURE-----/')
        echo -e "Quassel $TAGNAME\n\n$MESSAGE" > release_notes.txt

    - name: Prepare source archive
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        mkdir assets
        TAGNAME=$(git rev-parse --abbrev-ref $GITHUB_REF)
        PREFIX=quassel-$TAGNAME/
        TAR_BASE=assets/quassel-$TAGNAME
        git archive --format=tar --prefix=$PREFIX -o $TAR_BASE.tar $TAGNAME
        git submodule foreach --recursive "git archive --prefix=$PREFIX -o $TAR_BASE-\$sha1.tar HEAD"
        # Workaround for https://lists.gnu.org/archive/html/bug-tar/2008-08/msg00002.html
        for t in $TAR_BASE-*.tar; do tar --concatenate --file=$TAR_BASE.tar.xz "$t"; done
        xz $TAR_BASE.tar
        rm $TAR_BASE-*.tar

    - name: Prepare packages for release
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        shopt -s nullglob
        TAGNAME=$(git rev-parse --abbrev-ref $GITHUB_REF)
        for type in Client Core Mono; do
          files=(artifacts/macOS/Quassel$type*.dmg)
          [[ ${#files[@]} -eq 1 ]]
          mv "${files[0]}" assets/
        done
        windows_setups=(artifacts/Windows/quassel-*.exe)
        windows_archives=(artifacts/Windows/quassel-*.7z)
        if [[ ${#windows_setups[@]} -gt 0 || ${#windows_archives[@]} -gt 0 ]]; then
          [[ ${#windows_setups[@]} -eq 1 ]]
          [[ ${#windows_archives[@]} -eq 1 ]]
          mv "${windows_setups[0]}" assets/quassel-windows-setup-$TAGNAME.exe
          mv "${windows_archives[0]}" assets/quassel-windows-$TAGNAME.7z
        fi

    - name: Create checksums for release assets
      if: startsWith(github.ref, 'refs/tags/')
      run: find assets/ -type f -execdir sh -c 'sha256sum "$1" > "$1.sha256sum"' _ {} \;

    - name: Create draft release
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        # The stock upload-release-asset action can only handle single files
        # Instead, use the hub utility so we can upload all assets at once
        assets=()
        for asset in assets/*; do assets+=("-a" "$asset"); done
        hub release create -d "${assets[@]}" -F release_notes.txt `git rev-parse --abbrev-ref $GITHUB_REF`
